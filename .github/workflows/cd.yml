# =============================================================================
# CD — Continuous Deployment (PRD §14.2).
#
# On a push to main (after a manual approval on the `production` environment):
#   OIDC auth → build & push image to ECR → terraform apply → SSM deploy → smoke.
#
# There are NO long-lived AWS keys. Auth is via GitHub OIDC: GitHub mints a
# short-lived token, AWS trades it for temporary credentials for the deploy role
# (whose trust policy is scoped to this repo + the production environment).
#
# Required repository VARIABLES (Settings → Secrets and variables → Actions →
# Variables — these are not secrets):
#   AWS_REGION           e.g. eu-central-1
#   AWS_DEPLOY_ROLE_ARN  output `deploy_role_arn` from terraform
#   ECR_REPOSITORY       the ECR repo name (e.g. tasks-api)
#   TF_STATE_BUCKET      the state bucket from infra/bootstrap
#   TF_LOCK_TABLE        the lock table from infra/bootstrap
# =============================================================================
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# OIDC needs id-token: write. contents: read to checkout.
permissions:
  id-token: write
  contents: read

# Never run two production deploys at once.
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    # Targeting a protected environment makes GitHub PAUSE for a required
    # reviewer's approval before this job runs (configured in repo settings).
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      # terraform apply deploys the lambda from this jar, so build it first.
      - name: Build lambda jar
        run: mvn -B -pl lambda -am package -DskipTests

      - name: Build and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build --platform linux/amd64 \
            --build-arg APP_VERSION="$IMAGE_TAG" \
            --build-arg GIT_COMMIT="$IMAGE_TAG" \
            -f docker/Dockerfile \
            -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Terraform init & apply
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          terraform -chdir=infra init -input=false \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=tasks-api/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"
          terraform -chdir=infra apply -input=false -auto-approve \
            -var="image_tag=$IMAGE_TAG" \
            -var="github_repo=$GITHUB_REPO" \
            -var="state_bucket=$TF_STATE_BUCKET" \
            -var="lock_table=$TF_LOCK_TABLE"

      - name: Deploy new image to the instance (SSM, no SSH)
        run: |
          INSTANCE_ID=$(terraform -chdir=infra output -raw instance_id)
          PARAM=$(terraform -chdir=infra output -raw image_tag_parameter)

          # Point the instance at the new tag, then re-run its deploy helper.
          aws ssm put-parameter --name "$PARAM" --type String \
            --value "$IMAGE_TAG" --overwrite --region "$AWS_REGION"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/usr/local/bin/deploy-app.sh"]' \
            --region "$AWS_REGION" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $CMD_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" --query Status --output text 2>/dev/null || echo Pending)
            echo "deploy status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "deploy command failed"; exit 1 ;;
            esac
            sleep 10
          done

      - name: Smoke test
        run: |
          API=$(terraform -chdir=infra output -raw api_base_url)
          scripts/smoke-test.sh "$API"
